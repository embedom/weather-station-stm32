name: Weather Station STM32 CI/CD (CMake)

on:
  push:
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  PROJECT_NAME: weather-station
  MAJOR_VERSION: "1"
  PATCH_VERSION: "0"
  BUILD_DIR: build

jobs:
  build:
    if: github.event_name != 'push' || !github.event.created
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
        # CMake presets are used to encapsulate all configuration options
        # - including toolchain selection and build type
        include:
          - build_type: Debug
            preset: CI-Debug
          - build_type: Release
            preset: CI-Release

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set version
      id: version
      run: |
        VERSION=${{ env.MAJOR_VERSION }}.${{ env.PATCH_VERSION }}.${{ github.run_number }}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Using version: $VERSION"

    - name: Install toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          cmake \
          ninja-build \
          clang-tidy

    - name: Cache build
      uses: actions/cache@v5
      with:
        path: ${{ env.BUILD_DIR }}
        key: ${{ runner.os }}-cmake-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          ${{ runner.os }}-cmake-${{ matrix.build_type }}-

    - name: Configure & Build
      run: |
        echo "::add-matcher::.github/problem-matchers/clang-tidy.json"
        cmake --preset ${{ matrix.preset }}
        cmake --build --preset ${{ matrix.preset }} -j$(nproc)

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{ matrix.build_type }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: firmware_${{ steps.version.outputs.version }}-${{ matrix.build_type }}
        retention-days: 7
        path: |
          ${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}.elf
          ${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}.bin

    outputs:
      version: ${{ steps.version.outputs.version }}

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (needed for tagging)
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: firmware_${{ needs.build.outputs.version }}-Release
          path: artifacts

      - name: Create Release and Tag
        run: |
          gh release create ${{ needs.build.outputs.version }} \
            --title "Release ${{ needs.build.outputs.version }}" \
            --generate-notes \
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}